<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>StudyMatch — Main</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container">
        <div style="display:flex;justify-content:space-between;align-items:center">
            <div>
                <h1>📚 StudyMatch</h1>
                <p id="welcomeMsg">Welcome</p>
            </div>
            <div>
                <button id="signOutBtn" style="width:auto;padding:8px 12px">Sign Out</button>
            </div>
        </div>

        <div class="card" style="margin-top:18px">
            <div class="search-bar">
                <input id="searchInput" class="search-input" placeholder="Search by name, major, skills or needs" />
                <button id="searchBtn" class="search-btn">Search</button>
            </div>
            <p style="text-align:center;margin-top:8px;color:#666">Search across profiles to find study partners.</p>
        </div>

        <div id="profileArea" class="card hidden">
            <h2>Build Your Profile</h2>
            <input type="text" id="major" placeholder="Major (e.g. Computer Science)" />
            <input type="text" id="skills" placeholder="Skills you can teach" />
            <input type="text" id="needs" placeholder="Subjects you need help in" />
            <button id="saveProfileBtn">Save Profile</button>
        </div>

        <div id="matchArea" class="hidden">
            <h2>Suggested Matches</h2>
            <div id="results"></div>
        </div>

    </div>

    <!-- Supabase client and config (if present) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js/dist/umd/supabase.min.js"></script>
    <script src="supabase-config.js"></script>
    <script src="main.js"></script>
</body>
</html>
